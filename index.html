	<style>
		/* Overlay background */
		#page-loader {
		    position: fixed;
		    inset: 0;
		    background: rgba(255, 255, 255, 0.6); /* fade effect */
		    backdrop-filter: blur(2px); /* optional modern blur */
		    
		    display: flex;
		    align-items: center;
		    justify-content: center;

		    z-index: 9999;
		    opacity: 0;
		    pointer-events: none;
		    transition: opacity 0.2s ease;
		}

		/* Active state */
		#page-loader.active {
		    opacity: 1;
		    pointer-events: all;
		}

		/* Center box */
		.loader-box {
		    display: flex;
		    flex-direction: column;
		    align-items: center;
		    gap: 8px;
		    font-size: 13px;
		    color: #333;
		}

		/* Spinner */
		.spinner {
		    width: 32px;
		    height: 32px;
		    border: 3px solid #ddd;
		    border-top: 3px solid #4f46e5;
		    border-radius: 50%;
		    animation: spin 0.8s linear infinite;
		}

		@keyframes spin {
		    to { transform: rotate(360deg); }
		}
	</style>
</head>

	<div id="page-loader">
	    <div class="loader-box">

	</div>
